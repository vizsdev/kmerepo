services:
  - type: web
    name: mfg-tracker
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn production_tracker.wsgi:application --workers 2 --timeout 60
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mfg-tracker-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: kme-tracker-db
    databaseName: kme_tracker
    user: kme_user
    plan: free
