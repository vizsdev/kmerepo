{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — KME Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-brand">
      <span class="brand-icon large">⬡</span>
      <div class="brand-name large">KME Tracker</div>
      <div class="brand-sub">Manufacturing Production System</div>
    </div>

    <div class="login-card">
      <h2 class="login-title">Sign in</h2>
      {% if form.errors %}
      <div class="alert alert-error">Invalid username or password.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" autofocus required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-primary full-width">Sign In →</button>
      </form>
    </div>

    <div class="login-footer">
      Version 1.0 · Production Tracker
    </div>
  </div>
</body>
</html>
